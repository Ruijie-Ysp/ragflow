include:
  - ./docker-compose-base.yml
# To ensure that the container processes the locally modified `service_conf.yaml.template` instead of the one included in its image, you need to mount the local `service_conf.yaml.template` to the container.
services:
  ragflow:
    depends_on:
      mysql:
        condition: service_healthy
    image: ${RAGFLOW_IMAGE}
    # Example configuration to set up an MCP server:
    # command:
    #   - --enable-mcpserver
    #   - --mcp-host=0.0.0.0
    #   - --mcp-port=9382
    #   - --mcp-base-url=http://127.0.0.1:9380
    #   - --mcp-script-path=/ragflow/mcp/server/server.py
    #   - --mcp-mode=self-host
    #   - --mcp-host-api-key=ragflow-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    # Optional transport flags for MCP (customize if needed).
    # Host mode need to combined with --no-transport-streamable-http-enabled flag, namely, host+streamable-http is not supported yet.
    # The following are enabled by default unless explicitly disabled with --no-<flag>.
    #   - --no-transport-sse-enabled # Disable legacy SSE endpoints (/sse and /messages/)
    #   - --no-transport-streamable-http-enabled #  Disable Streamable HTTP transport (/mcp endpoint)
    #   - --no-json-response # Disable JSON response mode in Streamable HTTP transport (instead of SSE over HTTP)

    # Example configration to start Admin server:
    # command:
    #   - --enable-adminserver
    container_name: ragflow-server
    ports:
      - ${SVR_HTTP_PORT}:9380
      - ${ADMIN_SVR_HTTP_PORT}:9381
      - 80:80
      - 443:443
      - 5678:5678
      - 5679:5679
      - 9382:9382 # entry for MCP (host_port:docker_port). The docker_port must match the value you set for `mcp-port` above.
    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../history_data_agent:/ragflow/history_data_agent
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
      # Mount all modified files for Langfuse v3 migration (total: 15 files)
      # API layer (4 files)
      - ../api/apps/langfuse_app.py:/ragflow/api/apps/langfuse_app.py
      - ../api/db/services/llm_service.py:/ragflow/api/db/services/llm_service.py
      - ../api/db/services/langfuse_service.py:/ragflow/api/db/services/langfuse_service.py
      - ../api/db/services/tenant_llm_service.py:/ragflow/api/db/services/tenant_llm_service.py
      # RAG layer - LLM (1 file)
      - ../rag/llm/chat_model.py:/ragflow/rag/llm/chat_model.py
      # RAG layer - Utils (1 file)
      - ../rag/utils/__init__.py:/ragflow/rag/utils/__init__.py
      # RAG layer - Prompts (2 files)
      - ../rag/prompts/generator.py:/ragflow/rag/prompts/generator.py
      - ../rag/prompts/template.py:/ragflow/rag/prompts/template.py
      # RAG layer - Flow (2 files - chunker.py doesn't exist in v0.21)
      - ../rag/flow/parser/parser.py:/ragflow/rag/flow/parser/parser.py
      - ../rag/flow/tokenizer/tokenizer.py:/ragflow/rag/flow/tokenizer/tokenizer.py
      # Agent layer (5 files)
      - ../agent/canvas.py:/ragflow/agent/canvas.py
      - ../agent/component/llm.py:/ragflow/agent/component/llm.py
      - ../agent/component/categorize.py:/ragflow/agent/component/categorize.py
      - ../agent/component/agent_with_tools.py:/ragflow/agent/component/agent_with_tools.py
      - ../agent/tools/retrieval.py:/ragflow/agent/tools/retrieval.py
      # Mount local configs and source code for live debugging
      - ../conf/docker.service_conf.yaml:/ragflow/conf/local.service_conf.yaml:ro
      - ../api:/ragflow/api
      - ../rag:/ragflow/rag
      - ../agent:/ragflow/agent


    env_file: .env
    environment:
      - TZ=${TIMEZONE}
      - HF_ENDPOINT=${HF_ENDPOINT-}
      - MACOS=${MACOS-}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED}

    networks:
      - ragflow
    restart: on-failure
    # https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # If you use Docker Desktop, the --add-host flag is optional. This flag ensures that the host's internal IP is exposed to the Prometheus container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
  # executor:
  ragflow-proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
      args:
        PYTHON_BASE: ${PYTHON_BASE_IMAGE-python:3.9-slim}
    image: ragflow-openai-proxy:latest
    container_name: ragflow-openai-proxy
    depends_on:
      ragflow:
        condition: service_started
    ports:
      - ${PROXY_PORT}:8000
    env_file: .env
    environment:
      - RAGFLOW_BASE_URL=http://ragflow:80
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY}
      - TZ=${TIMEZONE}
    networks:
      - ragflow
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
